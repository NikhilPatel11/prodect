<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons for eye toggle -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(to right, #6a11cb, #2575fc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.login-container {
    background-color: white;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.login-container h2 {
    margin-bottom: 30px;
    color: #2575fc;
}

.form-control {
    border-radius: 10px;
    margin-bottom: 20px;
    height: 45px;
    padding: 10px;
}

.password-wrapper {
    position: relative;
}

.password-wrapper i {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #6c757d;
}

.btn-login {
    width: 100%;
    border-radius: 10px;
    background: #2575fc;
    color: white;
    font-weight: bold;
    height: 45px;
}

.btn-login:hover {
    background: #6a11cb;
}

.links {
    margin-top: 15px;
}

.links a {
    margin: 0 5px;
    color: #2575fc;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}

.alert-clue {
    background-color: #e7f0ff;
    color: #2575fc;
    padding: 10px;
    border-radius: 10px;
    margin-top: 15px;
}

.alert-error {
    background-color: #fdecea;
    color: #d9534f;
    padding: 10px;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="login-container">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="password-wrapper mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" id="password" required>
            <i class="bi bi-eye" id="togglePassword"></i>
        </div>

        <button type="submit" class="btn btn-login mb-3">Login</button>
    </form>

    <div class="links">
        <a href="/register/">New User? Register</a> |
        <a href="/forgot/">Forgot Password</a>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    {% if clue %}
    <div class="alert-clue">
        <p><strong>Clue:</strong> {{ clue }}</p>
        <p>Remaining attempts: {{ remaining }}</p>
    </div>
    {% endif %}

    {% if timer %}
    <div class="alert-error">
        <p id="countdown">Wait {{ timer }} seconds</p>
    </div>

    <script>
        let time = { timer };
        let countdown = document.getElementById('countdown');
        let interval = setInterval(function() {
            time--;
            countdown.innerHTML = "Wait " + time + " seconds";
            if(time <= 0) clearInterval(interval);
        }, 1000);
    </script>
    {% endif %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Toggle password visibility
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('bi-eye-slash');
});
</script>

</body>
</html>
