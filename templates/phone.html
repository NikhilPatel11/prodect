<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #6a11cb, #2575fc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.login-container {
    background-color: white;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.login-container h2 {
    margin-bottom: 30px;
    color: #2575fc;
}

.form-control {
    border-radius: 10px;
    margin-bottom: 20px;
    height: 45px;
    padding: 10px;
}

.btn-login {
    width: 100%;
    border-radius: 10px;
    background: #2575fc;
    color: white;
    font-weight: bold;
    height: 45px;
}

.btn-login:hover {
    background: #6a11cb;
}

.links {
    margin-top: 20px;
}

.links a {
    color: #2575fc;
    text-decoration: none;
    font-weight: 500;
}

.links a:hover {
    text-decoration: underline;
}

.alert-error {
    background-color: #fdecea;
    color: #d9534f;
    padding: 10px;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Forgot Password</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="phone" class="form-control" placeholder="Enter registered phone" required>
        <button type="submit" class="btn-login">Send OTP</button>
    </form>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <div class="links">
        <a href="/login/">Back to Login</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
