<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(to right, #6a11cb, #2575fc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}
.login-container {
    background-color: white;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
    text-align: center;
}
.login-container h2 {
    margin-bottom: 30px;
    color: #2575fc;
}
.form-control {
    border-radius: 10px;
    margin-bottom: 20px;
    height: 45px;
    padding: 10px;
}
.password-wrapper {
    position: relative;
}
.password-wrapper i {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #6c757d;
}
.btn-login {
    width: 100%;
    border-radius: 10px;
    background: #2575fc;
    color: white;
    font-weight: bold;
    height: 45px;
}
.btn-login:hover {
    background: #6a11cb;
}
.links {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
}
.links a {
    color: #2575fc;
    text-decoration: none;
    font-weight: 500;
}
.links a:hover {
    text-decoration: underline;
}
.alert-error {
    background-color: #fdecea;
    color: #d9534f;
    padding: 10px;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Register New User</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="phone" value="{{ request.GET.phone }}">

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="password-wrapper">

            <input type="password" name="password" class="form-control" placeholder="Enter Password" id="password" required>
            <i class="bi bi-eye" id="togglePassword"></i>
        </div>

        <div class="password-wrapper">
            <input type="text" name="phone" class="form-control" placeholder="Enter Phone Number" required>

        </div>

        <input type="number" name="key" class="form-control" placeholder="Enter key for encryption" required>
        <button type="submit" class="btn-login">Register Now</button>
    </form>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <div class="links">
        <a href="/login/">Back to Login</a>
        <a href="/logout/">Logout</a>
    </div>
</div>

<!-- Bootstrap Icons for eye toggle -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Toggle Password Visibility
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('bi-eye-slash');
});

const toggleConfirm = document.querySelector('#toggleConfirm');
const confirm = document.querySelector('#confirm');

toggleConfirm.addEventListener('click', function () {
    const type = confirm.getAttribute('type') === 'password' ? 'text' : 'password';
    confirm.setAttribute('type', type);
    this.classList.toggle('bi-eye-slash');
});
</script>
</body>
</html>
