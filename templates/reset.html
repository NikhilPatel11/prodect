<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(to right, #6a11cb, #2575fc); height: 100vh; display:flex; justify-content:center; align-items:center; font-family:'Segoe UI', sans-serif; }
.login-container { background:white; padding:40px 30px; border-radius:15px; box-shadow:0px 10px 25px rgba(0,0,0,0.2); width:100%; max-width:400px; }
.login-container h2 { text-align:center; margin-bottom:30px; color:#2575fc; }
.form-control { border-radius:10px; }
.btn-login { width:100%; border-radius:10px; background:#2575fc; color:white; font-weight:bold; }
.btn-login:hover { background:#6a11cb; }
.alert-error { background-color:#fdecea; color:#d9534f; padding:10px; border-radius:10px; margin-top:15px; }
</style>
</head>
<body>
<div class="login-container">
<h2>Reset Password</h2>
<form method="POST">
    {% csrf_token %}
    <input type="hidden" name="phone" value="{{ request.GET.phone }}">
    <input type="password" name="password" placeholder="New Password" required>
    <input type="password" name="confirm" placeholder="Confirm Password" required>
    <input type="number" name="key" placeholder="Enter key for encryption" required>
    <button type="submit">Reset Password</button>
</form>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
{% if error %}
<div class="alert-error">{{ error }}</div>
{% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
