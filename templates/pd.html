    {% extends "hf.html" %}

{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="{% static 'pac.css' %}">
    <title>Admission Form</title>
    
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>


    {% block body %}
      

<div class="container-fluid">
      <div class="container">
        <body>

        <form action="" method="GET">
            {% csrf_token %}
            <div class="search-container">
                <input type="text" name="search" class="search-input" placeholder="Search.." value="{{search}}">
                <button class="search-button">
                    <a href="product_detail" >
                        <i class="fa fa-search" style="font-size:20px"></i>
                    </a>
                </button>
            </div>
        </form>

        <div class="main_category">
            {% for p in prd  %}
            <div class="category">
                <div class="image">
                    <td><img style="border-radius: 5%" src="/media/{{p.img}}" height="80px" width="80px"></td>
                </div>
                <h1>{{ p.name }}</h1>
                <p>{{ p.desc }}</p>
                <p class="price">₹ {{ p.price }}</p>
                <div class="button">
                    <a href="about/{{p.id}}" class="submit">view product</a>
                    <a href="delete/{{p.id}}"  onclick="return confirm('Do you want to delete?')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="23"     height="23" fill="currentColor" class="bi bi-trash3 deletepro" viewBox="0 0 16 16">
                        <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
                      </svg></a>

                    <!-- <a href="cart/{{p.id}}" class="submit">Add To Cart</a> -->

                </div>
            </div>
            {% endfor %}
        </div>
</body>
      </div>
    </div>

    {% endblock body %}
  </body>

</html>
