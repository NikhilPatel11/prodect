    {% extends "hf.html" %}

{% load static %}
<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="{% static 'pac.css' %}">
    <title>Admission Form</title>
    
  </head>
  <body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>

    {% block body %}    

        <div class="container-fluid">

            <div class="container">
        <div class="row">
            <div class="col">
                <form class="form" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input class="form-control inputetext" placeholder="Prodect Name" type="text" name="name" required>                                    
                    <input class="form-control inputetext" placeholder="Prodect Price" type="number" name="price" required>                                    
                    <input class="form-control inputetext" placeholder="Prodect Quantity" type="number" name="qunt" required >
                    <textarea name="desc" class="form-control inputetext prodec" placeholder="Product Descriptions"></textarea>
                    <input class="form-control inputetext" type="file" name="img" required>
                    <select name="category" class="form-control">   
                    {% for c in cat %}
                        <option value="{{c.id}}">
                            {{c.cat}}
                        </option>
                    {% endfor %}
                    </select>
                    
                    <button class="form-control subbut btn">CONFIRM NOW</button>
                </form>

            </div>
        </div>
            </div>
        </div>
      
    {% endblock body %}
    </body>
    </html>
