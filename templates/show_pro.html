{% extends "hf.html" %}

{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="{% static 'pac.css' %}">
    <title>Admission Form</title>
    
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>


    {% block body %}
      

<div class="container-fluid">
      <div class="container">
        <body>

        <form action="" method="GET">
            {% csrf_token %}
            <div class="search-container">
                <input type="text" name="search" class="search-input" placeholder="Search.." value="{{search}}">
                <button class="search-button">
                    <a href="product_detail" >
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                      </svg>
                    </a>
                </button>
            </div>
        </form>

        <div class="container-fluid">
            <div class="container ">
                <div class="row">
                    <div class="col-md-6">
                        <div class="catecate" style="width: 80%;">
                            <td><img class="product_img" src="/media/{{item.img}}"></td>
                        </div>
                        
                    </div>
                    <div class="col-md-6">
                        <h1>{{ item.name }}</h1>
                        <p style="font-size: 22px;color: #0f1111">{{ item.desc }}</p>
                        <p style="font-size: 28px;color: #0f1111">₹ {{ item.price }}</p>
                        
                        {% for c in cat %}
                        <option value="{{c.qunt}}">
                            {{c.qunt}}
                        </option><br>
                        {% endfor %}
                        <div class="probut">
                            <a href="/add_cart/{{item.id}}"><button class="atoc atoch atocb">Add to Cart</button></a><br>
                            <a href="#" style="margin: -20;"><button class="buynow buynh atocb">Buy Now</a></button>
                        </div>
                            <!-- <a href="cart/{{p.id}}" class="submit">Add To Cart</a> -->

                    </div>
                </div>
            </div>


        </div>
       
</body>
      </div>
    </div>

    {% endblock body %}
  </body>

</html>
