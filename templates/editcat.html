{% extends "hf.html" %}
{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="{% static 'ndb.css' %}">
    <title>Edit Students</title>

  </head>
  <body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>

    {% block body %}
<div class="container-fluid bgimg">
      <div class="container">
        <div class="row">
            <div class="col">
                <form class="form" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
    
                    <input class="form-control inputetext" placeholder="Product Name" type="text" name="cat" value={{ ce.cat }} required>                                    
                                
                    <input class="form-control inputeimg" placeholder="Image" type="file" name="img" value={{ ce.img }}>      
                    <img style="border-radius: 10%;margin-top: 7px;" src="/media/{{ce.img}}"  width="80px" height="100px">                                                    
                    <button class="form-control subbut btn" type= "submit">SAVE CHANGES</button>
                             
                </form>

            </div>
        </div>
      </div>
    </div>

    </body>
    {% endblock body %}
    </html>
